name: Frontend CI

on:
  push:
    branches: [ dev ]
    paths:
      - 'frontend/**'
  pull_request:
    branches: [ dev ]
    paths:
      - 'frontend/**'

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm run test

      - name: Run build check
        run: npm run build
