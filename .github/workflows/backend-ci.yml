name: Backend CI

on:
  pull_request:
    branches:
      - dev

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: hireflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d hireflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/hireflow

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U postgres -d hireflow && exit 0
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Prepare database schema
        run: |
          alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v
